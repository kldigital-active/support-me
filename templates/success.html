<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Thanks</title>
<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(160deg, #fff0f6, #ffffff);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    flex-direction: column;
    text-align: center;
    padding: 24px;
  }

  h1 {
    font-size: 28px;
    color: #2b2b2b;
    margin: 0 0 18px;
  }

  .heart {
    font-size: 90px;
    color: #ff1744;
    animation: pop 0.6s cubic-bezier(.17,.89,.32,1.49) forwards;
    transform: scale(0);
    filter: drop-shadow(0 8px 16px rgba(255, 23, 68, 0.35));
  }

  @keyframes pop {
    0%   { transform: scale(0) rotate(0deg); }
    60%  { transform: scale(1.3) rotate(-8deg); }
    80%  { transform: scale(0.9) rotate(4deg); }
    100% { transform: scale(1) rotate(0deg); }
  }

  .pulse {
    animation: pop 0.6s cubic-bezier(.17,.89,.32,1.49) forwards, pulse 1.6s ease-in-out 0.6s infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.12); }
  }

  p {
    color: #8a8a8a;
    font-size: 15px;
    margin-top: 18px;
  }
</style>
</head>
<body>

  <h1>Thanks</h1>
  <div class="heart pulse">❤️</div>
  <p>Payment received 💕</p>

</body>
</html>
